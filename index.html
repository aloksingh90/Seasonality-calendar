<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete SKU & Procurement Manager - noon.com</title>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
padding:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Oxygen','Ubuntu','Cantarell','Fira Sans','Droid Sans','Helvetica Neue',sans-serif;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useMemo}=React;

const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const monthMap={
Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,
Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11
};

const CompleteSKUManager=()=>{

const currentMonth='Mar';
const nextMonth='Apr';

const currentMonthFull='March 2026';
const nextMonthFull='April 2026';

const allSKUs=[
{
id:1,
name:'Banana',
category:'Fruits',
currentSources:['Ecuador','India'],
seasons:[
{geography:'Ecuador',peak:'Year-round',available:'Jan-Dec',quality:'Premium',current:true},
{geography:'India',peak:'Year-round',available:'Jan-Dec',quality:'Premium',current:true},
{geography:'Philippines',peak:'Year-round',available:'Jan-Dec',quality:'High',current:false},
{geography:'Costa Rica',peak:'Year-round',available:'Jan-Dec',quality:'High',current:false}
]
},
{
id:2,
name:'Apple',
category:'Fruits',
currentSources:['China','Italy','New Zealand'],
seasons:[
{geography:'New Zealand',peak:'Mar-May',available:'Feb-Jun',quality:'Premium',current:true},
{geography:'China',peak:'Sep-Nov',available:'Aug-Mar',quality:'Good',current:true},
{geography:'Italy',peak:'Sep-Nov',available:'Aug-Feb',quality:'Premium',current:true},
{geography:'USA',peak:'Sep-Nov',available:'Year-round',quality:'Premium',current:false},
{geography:'Chile',peak:'Feb-Apr',available:'Jan-May',quality:'High',current:false}
]
}
];

const [selectedSKU,setSelectedSKU]=useState(allSKUs[0]);

const parseSeasonRange=(range)=>{
if(range==='Year-round') return {start:0,end:11};
const[start,end]=range.split('-');
return{start:monthMap[start],end:monthMap[end]};
};

const isInSeason=(month,range)=>{
if(range==='Year-round') return true;

const{start,end}=parseSeasonRange(range);
const m=monthMap[month];

if(start<=end) return m>=start&&m<=end;
return m>=start||m<=end;
};

return(

<div style={{padding:"40px"}}>

<h1>SKU Seasonal Calendar</h1>

<select
value={selectedSKU.name}
onChange={(e)=>setSelectedSKU(allSKUs.find(s=>s.name===e.target.value))}
>

{allSKUs.map(sku=>(
<option key={sku.id}>{sku.name}</option>
))}

</select>

<table border="1" cellPadding="10" style={{marginTop:"20px"}}>

<thead>

<tr>
<th>Country</th>
{months.map(m=>(
<th key={m}>{m}</th>
))}
<th>Quality</th>
</tr>

</thead>

<tbody>

{selectedSKU.seasons.map((season,i)=>(
<tr key={i}>

<td>{season.geography}</td>

{months.map(month=>{

const peak=isInSeason(month,season.peak);
const avail=isInSeason(month,season.available);

return(
<td key={month}>
{peak?'PEAK':avail?'Avail':'-'}
</td>
)

})}

<td>{season.quality}</td>

</tr>
))}

</tbody>

</table>

</div>

);

};

ReactDOM.render(<CompleteSKUManager/>,document.getElementById("root"));

</script>

</body>
</html>
